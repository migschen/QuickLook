# run a build for the latest version and upload the artifacts to a "latest" pre-release

name: build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: ./QuickLook.slnx

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        ref: master

    # ------------ 修复版本号报错（唯一改动点）------------
    - name: Fix GitVersion.cs
      shell: pwsh
      run: |
        echo '[assembly: AssemblyVersion("1.0.0.0")]' > GitVersion.cs
        echo '[assembly: AssemblyFileVersion("1.0.0.0")]' >> GitVersion.cs
    # -----------------------------------------------------

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:BuildInParallel=true /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}

    - uses: actions/upload-artifact@v6
      with:
        name: quicklook-build-files
        path: Build/QuickLook-*.*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    if: github.event_name == 'push'
    
    steps:
    - uses: download-artifact@v6
      with:
        name: quicklook-build-files
    
    - name: Update latest release
      uses: pyTooling/Actions/releaser@r6
      with:
        tag: latest
        rm: true
        token: ${{ secrets.GITHUB_TOKEN }}
        files: QuickLook-*.*
